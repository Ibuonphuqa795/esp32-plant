<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPORO — Đăng nhập</title>
  <style>
    :root { --green:#16a34a; --blue:#4f46e5; --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif; }
    [data-theme="light"] { --bg:#f4f5fb; --card:#fff; --text:#1f2430; --muted:#8a93a6; --hair:#e6e9f2; --field:#f5f7fb; }
    [data-theme="dark"]  { --bg:#0b0f1a; --card:#141926; --text:#e8ecf4; --muted:#8a94a8; --hair:#232b3a; --field:#1b2230; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
    body { font-family:var(--font); min-height:100vh; display:grid; place-items:center; padding:20px;
      background:radial-gradient(1100px 550px at 80% -10%, rgba(22,163,74,.18), transparent), var(--bg);
      color:var(--text); transition:background .3s; }
    .card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--hair); border-radius:24px;
      padding:40px 32px; box-shadow:0 20px 60px rgba(20,30,60,.12); }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
    .logo { width:52px; height:52px; border-radius:15px; background:linear-gradient(135deg,var(--green),#15803d);
      display:grid; place-items:center; font-size:28px; box-shadow:0 6px 20px rgba(22,163,74,.4); }
    .brand b { font-size:26px; font-weight:800; letter-spacing:.5px; }
    .brand small { display:block; font-size:11px; color:var(--muted); }
    h1 { font-size:19px; font-weight:700; margin-bottom:4px; }
    .sub { font-size:13px; color:var(--muted); margin-bottom:26px; }
    label { font-size:13px; color:var(--muted); font-weight:600; display:block; margin-bottom:7px; }
    .inp { width:100%; padding:13px 15px; border-radius:13px; border:1px solid var(--hair); background:var(--field);
      color:var(--text); font-size:15px; font-family:var(--font); outline:none; margin-bottom:16px; transition:.15s; }
    .inp:focus { border-color:var(--green); background:var(--card); }
    .btn { width:100%; padding:14px; border-radius:13px; border:none; cursor:pointer; background:var(--green); color:#fff;
      font-weight:700; font-size:16px; font-family:var(--font); transition:.15s; margin-top:4px; }
    .btn:hover { filter:brightness(1.06); } .btn:active { transform:scale(.98); }
    .btn:disabled { opacity:.6; cursor:default; }
    .err { background:rgba(239,68,68,.12); color:#ef4444; font-size:13px; font-weight:600; padding:11px 14px;
      border-radius:11px; margin-bottom:16px; display:none; }
    .err.show { display:block; }
    .foot { text-align:center; font-size:12px; color:var(--muted); margin-top:22px; line-height:1.6; }
    .theme { position:fixed; top:20px; right:20px; width:42px; height:42px; border-radius:50%; border:1px solid var(--hair);
      background:var(--card); color:var(--text); font-size:18px; cursor:pointer; display:grid; place-items:center; }
  </style>
</head>
<body>
  <button class="theme" id="themeBtn">🌙</button>
  <div class="card">
    <div class="brand">
      <div class="logo">🌱</div>
      <div><b>SPORO</b><small>Team BRUTICUS · HCMUT</small></div>
    </div>
    <h1>Đăng nhập</h1>
    <div class="sub">Hệ thống giám sát vườn ươm cây giống</div>

    <div class="err" id="err"></div>
    <form id="form">
      <label for="user">Tài khoản</label>
      <input class="inp" id="user" placeholder="vd: khoa" autocomplete="username" autofocus>
      <label for="pass">Mật khẩu</label>
      <input class="inp" id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn" id="btn" type="submit">Đăng nhập</button>
    </form>
    <div class="foot">Chưa có tài khoản? <a href="/register.html" style="color:var(--green);font-weight:600;text-decoration:none">Đăng ký</a><br><span style="font-size:12px">Tài khoản demo: <b>khoa</b> / <b>khoa123</b></span></div>
  </div>

  <script>
    const root = document.documentElement;
    const saved = localStorage.getItem("sporo-theme") || "light";
    root.setAttribute("data-theme", saved);
    const tb = document.getElementById("themeBtn");
    tb.textContent = saved === "dark" ? "🌙" : "☀️";
    tb.onclick = () => {
      const t = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", t); localStorage.setItem("sporo-theme", t);
      tb.textContent = t === "dark" ? "🌙" : "☀️";
    };

    const form = document.getElementById("form"), err = document.getElementById("err"), btn = document.getElementById("btn");
    form.onsubmit = async (e) => {
      e.preventDefault();
      err.classList.remove("show");
      btn.disabled = true; btn.textContent = "Đang kiểm tra…";
      try {
        const r = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: document.getElementById("user").value, pass: document.getElementById("pass").value })
        });
        const j = await r.json();
        if (j.ok) { window.location.href = "/"; }
        else { err.textContent = j.error || "Đăng nhập thất bại"; err.classList.add("show"); btn.disabled = false; btn.textContent = "Đăng nhập"; }
      } catch (e) {
        err.textContent = "Không kết nối được server"; err.classList.add("show");
        btn.disabled = false; btn.textContent = "Đăng nhập";
      }
    };
  </script>
</body>
</html>

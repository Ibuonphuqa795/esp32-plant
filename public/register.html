<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPORO — Đăng ký</title>
  <style>
    :root { --green:#16a34a; --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif; }
    [data-theme="light"] { --bg:#f4f5fb; --card:#fff; --text:#1f2430; --muted:#8a93a6; --hair:#e6e9f2; --field:#f5f7fb; }
    [data-theme="dark"]  { --bg:#0b0f1a; --card:#141926; --text:#e8ecf4; --muted:#8a94a8; --hair:#232b3a; --field:#1b2230; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
    body { font-family:var(--font); min-height:100vh; display:grid; place-items:center; padding:20px;
      background:radial-gradient(1100px 550px at 80% -10%, rgba(22,163,74,.18), transparent), var(--bg);
      color:var(--text); transition:background .3s; }
    .card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--hair); border-radius:24px; padding:38px 32px; box-shadow:0 20px 60px rgba(20,30,60,.12); }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .logo { width:52px; height:52px; border-radius:15px; background:linear-gradient(135deg,var(--green),#15803d); display:grid; place-items:center; font-size:28px; box-shadow:0 6px 20px rgba(22,163,74,.4); }
    .brand b { font-size:26px; font-weight:800; letter-spacing:.5px; } .brand small { display:block; font-size:11px; color:var(--muted); }
    h1 { font-size:19px; font-weight:700; margin-bottom:4px; } .sub { font-size:13px; color:var(--muted); margin-bottom:22px; }
    label { font-size:13px; color:var(--muted); font-weight:600; display:block; margin-bottom:7px; }
    .inp { width:100%; padding:12px 15px; border-radius:13px; border:1px solid var(--hair); background:var(--field); color:var(--text); font-size:15px; font-family:var(--font); outline:none; margin-bottom:14px; transition:.15s; }
    .inp:focus { border-color:var(--green); background:var(--card); }
    .btn { width:100%; padding:14px; border-radius:13px; border:none; cursor:pointer; background:var(--green); color:#fff; font-weight:700; font-size:16px; font-family:var(--font); transition:.15s; margin-top:4px; }
    .btn:hover { filter:brightness(1.06); } .btn:active { transform:scale(.98); } .btn:disabled { opacity:.6; cursor:default; }
    .msg { font-size:13px; font-weight:600; padding:11px 14px; border-radius:11px; margin-bottom:14px; display:none; }
    .msg.show { display:block; } .msg.err { background:rgba(239,68,68,.12); color:#ef4444; } .msg.ok { background:rgba(22,163,74,.12); color:var(--green); }
    .foot { text-align:center; font-size:13px; color:var(--muted); margin-top:20px; }
    .foot a { color:var(--green); font-weight:600; text-decoration:none; }
    .theme { position:fixed; top:20px; right:20px; width:42px; height:42px; border-radius:50%; border:1px solid var(--hair); background:var(--card); color:var(--text); font-size:18px; cursor:pointer; display:grid; place-items:center; }
  </style>
</head>
<body>
  <button class="theme" id="themeBtn">🌙</button>
  <div class="card">
    <div class="brand"><div class="logo">🌱</div><div><b>SPORO</b><small>Team BRUTICUS · HCMUT</small></div></div>
    <h1>Tạo tài khoản</h1>
    <div class="sub">Đăng ký để truy cập hệ thống giám sát vườn ươm</div>
    <div class="msg" id="msg"></div>
    <form id="form">
      <label for="name">Tên hiển thị</label>
      <input class="inp" id="name" placeholder="vd: Nguyễn Văn A" autofocus>
      <label for="user">Tài khoản</label>
      <input class="inp" id="user" placeholder="chữ thường, số, gạch dưới (3–20 ký tự)" autocomplete="username">
      <label for="pass">Mật khẩu</label>
      <input class="inp" id="pass" type="password" placeholder="tối thiểu 6 ký tự" autocomplete="new-password">
      <button class="btn" id="btn" type="submit">Đăng ký</button>
    </form>
    <div class="foot">Đã có tài khoản? <a href="/login.html">Đăng nhập</a></div>
  </div>

  <script>
    const root = document.documentElement;
    const saved = localStorage.getItem("sporo-theme") || "light";
    root.setAttribute("data-theme", saved);
    const tb = document.getElementById("themeBtn");
    tb.textContent = saved === "dark" ? "🌙" : "☀️";
    tb.onclick = () => { const t = root.getAttribute("data-theme") === "dark" ? "light" : "dark"; root.setAttribute("data-theme", t); localStorage.setItem("sporo-theme", t); tb.textContent = t === "dark" ? "🌙" : "☀️"; };

    const form = document.getElementById("form"), msg = document.getElementById("msg"), btn = document.getElementById("btn");
    form.onsubmit = async (e) => {
      e.preventDefault();
      msg.className = "msg";
      btn.disabled = true; btn.textContent = "Đang tạo…";
      try {
        const r = await fetch("/api/register", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: document.getElementById("name").value, user: document.getElementById("user").value, pass: document.getElementById("pass").value })
        });
        const j = await r.json();
        if (j.ok) { msg.textContent = "Tạo tài khoản thành công! Đang vào hệ thống…"; msg.className = "msg ok show"; setTimeout(() => window.location.href = "/", 800); }
        else { msg.textContent = j.error || "Đăng ký thất bại"; msg.className = "msg err show"; btn.disabled = false; btn.textContent = "Đăng ký"; }
      } catch (e) {
        msg.textContent = "Không kết nối được server"; msg.className = "msg err show"; btn.disabled = false; btn.textContent = "Đăng ký";
      }
    };
  </script>
</body>
</html>
